version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  visual_service:
    build: ./services/visual_indexing_service
    ports:
      - "8003:8003"
    environment:
      - QDRANT_HOST=qdrant
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant

  text_service:
    build: ./services/text_indexing_service
    ports:
      - "8002:8002"
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  ingestion_service:
    build: ./services/ingestion_service
    ports:
      - "8001:8001"
    environment:
      - TEXT_SERVICE_URL=http://text_service:8002/embed
      - VISUAL_SERVICE_URL=http://visual_service:8003/embed-images
    volumes:
      - ./data:/app/data
    depends_on:
      - text_service
      - visual_service
