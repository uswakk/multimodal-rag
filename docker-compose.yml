services:

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  text_indexing_service:
    build: ./services/text_indexing_service
    ports:
      - "8002:8000"
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      - QDRANT_URL=http://qdrant:6333
      - HF_HOME=/root/.cache/huggingface
      - HF_ENDPOINT=https://hf-mirror.com
      - HF_HUB_DOWNLOAD_TIMEOUT=300
    volumes:
      - ./data:/app/data
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 1.5G

  visual_indexing_service:
    build: ./services/visual_indexing_service
    ports:
      - "8003:8000"
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - HF_HOME=/root/.cache/huggingface
      - HF_ENDPOINT=https://hf-mirror.com
      - HF_HUB_DOWNLOAD_TIMEOUT=300
    volumes:
      - ./data:/app/data
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 2G

  ingestion_service:
    build: ./services/ingestion_service
    ports:
      - "8001:8000"
    restart: unless-stopped
    depends_on:
      - text_indexing_service
      - visual_indexing_service
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 256M

  retrieval_service:
    build: ./services/retrieval_service
    ports:
      - "8004:8000"
    restart: unless-stopped
    environment:
      - QDRANT_URL=http://qdrant:6333
      - HF_HOME=/root/.cache/huggingface
      - HF_ENDPOINT=https://hf-mirror.com
      - HF_HUB_DOWNLOAD_TIMEOUT=300
    depends_on:
      - qdrant
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1.5G

  generation_service:
    build: ./services/generation_service
    ports:
      - "8005:8000"
    environment:
      - OLLAMA_HOST=host.docker.internal
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 256M

  api_gateway:
    build: ./services/api_gateway
    ports:
      - "8006:8000"
    restart: unless-stopped
    depends_on:
      retrieval_service:
        condition: service_healthy
      generation_service:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  huggingface_cache: